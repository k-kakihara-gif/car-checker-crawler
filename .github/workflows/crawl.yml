name: 中古車価格クローラー
on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      start_page:
        description: '開始ページ（省略時は自動）'
        required: false
        default: ''
permissions:
  contents: write
jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 依存関係をインストール
        run: npm install
      - name: クローラーを実行
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          START_PAGE: ${{ github.event.inputs.start_page }}
        run: node crawler.js
      - name: 実行結果をコミット（進捗保存）
        run: |
          git config --local user.email "crawler@github-actions"
          git config --local user.name "GitHub Actions"
          git add progress.json
          git diff --staged --quiet || git commit -m "進捗更新 $(date '+%Y-%m-%d %H:%M')"
          git push
