name: 中古車価格クローラー
on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      start_page:
        description: '開始ページ（省略時は自動）'
        required: false
        default: ''
jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 依存関係をインストール
        run: npm install
      - name: クローラーを実行
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          START_PAGE: ${{ github.event.inputs.start_page }}
        run: node crawler.js
